<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <title>Grey Lee</title>
  <meta charset="utf-8">
  <link rel="stylesheet" type="text/css" href="./css/index.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans|Ubuntu:700" rel="stylesheet">
  <link rel="shortcut icon" href="./assets/favicon.png"/>
</head>
<body>
  <!-- outer-wrapper, flipped left to achieve horizontal scroll - right side on top -->
  <div class="outer-wrapper">
    <!-- wrapper holds content -->
    <div class="wrapper">
      <div id="bg">
        <!-- mountains -->
        <img class="mtn foreground fadedIn" src="./assets/front_mountains.svg"/>
        <img class="mtn midground fadedIn" src="./assets/mid_mountains.svg"/>
        <img class="mtn background fadedIn" src="./assets/back_mountains.svg"/>

        <img class="arrows fadedIn" id="leftarrow" src="./assets/leftarrow.png">
        <img class="arrows fadedIn" id="rightarrow" src="./assets/rightarrow.png">
      </div>

      <div id="moon" class="fadedIn"></div>
      <div id="moonshadow"></div>

      <div id="start" class="landing content">
        <h1 id="name" class="fadedIn">Grey Lee</h1>
        <ul id="menu" class="fadedIn">
          <li>
            <a class="menuLink" href="#about">About</a>
          </li>
          <li>
            <a class="menuLink" href="#projects">Projects</a>
          </li>
          <li>
            <a class="menuLink" href="#art">Art</a>
          </li>
          <li>
            <a class="menuLink" href="#contact">Contact</a>
          </li>
        </ul>
      </div>

      <div id="about" href="#about" class="content fades">
        <h1 class="label">About</h1>
        <div class="black">
          <img id="profile" src="./assets/me.jpg"/>
          <p>Lorem ipsum whatever this is an image of me</p>
        </div>
      </div>

      <div id="projects" href="#projects" class="content fades">
        <h1 class="label">Projects</h1>
        <div class="black">
          <p>Blah blah</p>
        </div>
      </div>

      <div id="art" href="#art" class="content fades">
        <h1 class="label">Art</h1>
        <div class="black">
          <p>Blah blah</p>
        </div>
      </div>

      <div id="contact" href="#contact" class="content fades">
        <h1 class="label">Contact</h1>
        <div class="black">
          <ul>
            <li><a href="">GitHub</a></li>
            <li><a href="">LinkedIn</a></li>
            <li><a href="">Email</a></li>
          </ul>
        </div>
      </div>

    </div>
  </div>
  <script src="./js/parallax.js"></script>
</body>
</html>
